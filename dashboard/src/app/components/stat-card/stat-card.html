<span
  class="text-3xl font-bold tabular-nums leading-none"
  [class]="valueClass()"
>
  {{ value() ?? '—' }}
</span>
<div class="mt-3">
  <div class="text-xs uppercase tracking-wider text-fg">{{ label() }}</div>
  @if (subtitle(); as sub) {
    <div class="text-[11px] text-fg-muted mt-0.5">{{ sub }}</div>
  }
</div>
